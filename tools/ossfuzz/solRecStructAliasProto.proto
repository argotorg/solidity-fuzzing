// SPDX-License-Identifier: GPL-3.0

// Self-checking fuzzer for the recursive-storage-struct aliasing bug family
// (report #1392 and relatives). The bug: storage-to-storage whole-struct
// assignment where the source is reachable from the destination through a
// `Self[] children` array. The compiler clears the dynamic array before all
// member reads finish, destroying the source; fields that live in slots
// overlapping the cleared region come back zero.
//
// Shapes covered:
//   DIRECT       root = root.children[i]
//   VIA_POINTER  Node storage p = root.children[i]; root = p;
//   GRANDCHILD   root = root.children[i].children[j]
//
// Primitive fields vary in type (uint8..256, int256, address, bool, bytes32)
// to exercise different storage-packing and clean-up-mask code paths.

syntax = "proto2";

package solidity.test.solrecstructalias;

enum PrimType {
    U8 = 0;
    U16 = 1;
    U32 = 2;
    U64 = 3;
    U128 = 4;
    U256 = 5;
    I256 = 6;
    ADDRESS = 7;
    BOOL = 8;
    BYTES32 = 9;
}

enum AliasShape {
    DIRECT = 0;
    VIA_POINTER = 1;
    GRANDCHILD = 2;
}

message StructLayout {
    // Primitive field types placed BEFORE the recursive `children` array.
    // Truncated to kMaxFieldsPerSide in the converter.
    repeated PrimType prefix_types = 1;
    // Primitive field types placed AFTER the recursive `children` array.
    // Truncated to kMaxFieldsPerSide in the converter. The bug of interest
    // corrupts suffix fields specifically.
    repeated PrimType suffix_types = 2;
}

message Program {
    required StructLayout struct_layout = 1;

    // Pushes on root.children. Clamped to [1, kMaxPushes].
    optional uint32 push_count = 2;
    // Source child index for DIRECT and VIA_POINTER; also the root.children
    // index for GRANDCHILD. Clamped modulo push_count.
    optional uint32 child_index = 3;

    // 64-bit seed used to derive non-zero primitive field values. Field i
    // gets a value derived from (seed XOR magic) + i + 1 to guarantee the
    // written value is nonzero and distinguishable across fields.
    optional uint64 seed = 4;

    optional bool via_ir = 5;
    optional bool optimize = 6;

    optional AliasShape shape = 7;

    // GRANDCHILD only: how many pushes on root.children[child_index].children
    // (the grandchildren array). Clamped to [1, kMaxPushes]. Ignored for
    // other shapes.
    optional uint32 grandchild_push_count = 8;
    // GRANDCHILD only: index into the grandchildren array. Clamped mod
    // grandchild_push_count. Ignored for other shapes.
    optional uint32 grandchild_index = 9;
}
