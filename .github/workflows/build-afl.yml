name: Build AFL

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-afl:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/${{ github.repository }}-afl:latest
      env:
        CCACHE_DIR: /ccache

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive

      - name: Cache ccache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: /ccache
          key: ccache-ubuntu-afl-${{ github.sha }}
          restore-keys: ccache-ubuntu-afl-

      # The host build also drives the three external projects:
      # AFLplusplus, afl-ts, tree-sitter-solidity. So a plain `make` here
      # produces afl-clang-fast, libts.so, libtree-sitter-solidity.so plus
      # the (uninstrumented) harness in build/.
      - name: Build host tree (also builds AFL++, afl-ts, grammar)
        run: tools/afl/build_afl.sh

      - name: Verify external artefacts present
        run: |
          test -x AFLplusplus/afl-fuzz                                || { echo "afl-fuzz missing"; exit 1; }
          test -x AFLplusplus/afl-clang-fast++                        || { echo "afl-clang-fast++ missing"; exit 1; }
          test -f afl-ts/libts.so                                     || { echo "libts.so missing"; exit 1; }
          test -f tree-sitter-solidity/libtree-sitter-solidity.so     || { echo "grammar .so missing"; exit 1; }

      # The instrumented build uses AFLplusplus/afl-clang-fast{,++} as the
      # compiler and writes to build_afl/. evmone is built with stock clang
      # (workaround for an AFL++ wrapper bug — see CMakeLists.txt comment).
      - name: Build AFL-instrumented harness
        run: tools/afl/build_instrumented.sh

      - name: Verify harness is AFL-instrumented
        run: |
          test -x build_afl/tools/afl/sol_afl_diff_runner || { echo "harness missing"; exit 1; }
          # afl-clang-fast injects __afl_* symbols. If they're absent the
          # binary will run dumb-mode under afl-fuzz — silently degraded.
          if ! nm build_afl/tools/afl/sol_afl_diff_runner | grep -q __afl_area_ptr; then
            echo "ERROR: harness has no __afl_ symbols — instrumentation failed"
            exit 1
          fi

      - name: Smoke-test harness on a known-good source
        run: |
          cat > /tmp/smoke.sol <<'EOF'
          // SPDX-License-Identifier: GPL-3.0
          pragma solidity >=0.8.0;
          contract C {
              uint256 public x;
              function test() public returns (uint256) {
                  for (uint256 i = 0; i < 5; i++) x += i;
                  return x;
              }
          }
          EOF
          # Both binaries should run cleanly: 0 = no diff, anything else = failure.
          build/tools/afl/sol_afl_diff_runner       /tmp/smoke.sol
          build_afl/tools/afl/sol_afl_diff_runner   /tmp/smoke.sol
