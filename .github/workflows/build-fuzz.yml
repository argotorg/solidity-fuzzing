name: Build Fuzz

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-fuzz:
    runs-on: ubuntu-26.04

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive

      # Native libFuzzer build — no Docker. clang provides -fsanitize=fuzzer.
      # The fuzz world is built against libc++ (-stdlib=libc++), so we need the
      # libc++ headers/runtime; boost, protobuf and abseil are NOT taken from the
      # system (their distro builds are libstdc++) — the script rebuilds them
      # against libc++ into deps/, along with libprotobuf-mutator and evmone.
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake ccache git wget \
            clang libc++-dev libc++abi-dev

      - name: Cache ccache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.ccache
          key: ccache-ubuntu-fuzz-${{ github.sha }}
          restore-keys: ccache-ubuntu-fuzz-

      - name: Build fuzzers
        run: scripts/build_ossfuzz.sh
